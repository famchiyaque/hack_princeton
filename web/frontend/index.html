<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kinetic Web</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div id="live-view">
    <video id="cam" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>

    <div class="hud top-left">
      <div class="pill" id="exercise-label">Detecting…</div>
      <div class="pill" id="phase-label">—</div>
      <div class="picker">
        <button class="pick-btn" data-ex="squat">Squat</button>
        <button class="pick-btn" data-ex="pushup">Push-Up</button>
        <button class="pick-btn" data-ex="deadlift">Deadlift</button>
        <button class="pick-btn" data-ex="curl">Curl</button>
        <button class="pick-btn pick-auto active" data-ex="">Auto</button>
      </div>
    </div>
    <div class="hud top-right">
      <div class="metric">
        <div class="metric-value" id="rep-count">0</div>
        <div class="metric-label">reps</div>
      </div>
      <div class="metric">
        <div class="metric-value" id="score">—</div>
        <div class="metric-label">form</div>
      </div>
      <button id="mute-btn" class="btn-ghost" title="Mute coach" aria-label="Mute coach">🔊</button>
    </div>

    <div id="correction" class="correction"></div>

    <div id="debug" class="debug hidden">
      <div class="debug-row"><span>exercise</span><span id="d-ex">—</span></div>
      <div class="debug-row"><span>candidate</span><span id="d-cand">—</span></div>
      <div class="debug-row"><span>rep phase</span><span id="d-phase">—</span></div>
      <div class="debug-row"><span>primary</span><span id="d-primary">—</span></div>
      <div class="debug-row"><span>thresholds</span><span id="d-thresh">—</span></div>
      <div class="debug-divider"></div>
      <div class="debug-row"><span>knee</span><span id="d-knee">—</span></div>
      <div class="debug-row"><span>elbow</span><span id="d-elbow">—</span></div>
      <div class="debug-row"><span>hip</span><span id="d-hip">—</span></div>
      <div class="debug-row"><span>shoulder</span><span id="d-shoulder">—</span></div>
      <div class="debug-row"><span>spine</span><span id="d-spine">—</span></div>
    </div>

    <div class="hud bottom">
      <button id="end-btn" class="btn">End Session</button>
      <button id="debug-btn" class="btn-ghost" title="Toggle debug">🐞</button>
      <div id="status" class="status">connecting…</div>
    </div>
  </div>

  <div id="report-view" hidden>
    <div class="report-card">
      <h1 id="r-exercise">Session Report</h1>
      <div class="stat-row">
        <div class="stat"><div class="stat-value" id="r-reps">0</div><div>reps</div></div>
        <div class="stat"><div class="stat-value" id="r-score">0</div><div>avg score</div></div>
        <div class="stat"><div class="stat-value" id="r-consistency">0</div><div>consistency</div></div>
        <div class="stat"><div class="stat-value" id="r-duration">0s</div><div>duration</div></div>
      </div>

      <h2>Strengths</h2>
      <ul id="r-strengths"></ul>

      <h2>Focus Areas</h2>
      <ul id="r-risks"></ul>

      <h2>Tempo</h2>
      <div id="r-tempo"></div>

      <h2>Per-rep scores</h2>
      <div id="r-bars" class="bars"></div>

      <button id="again-btn" class="btn">New Session</button>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
